                        "ARCHITECTURE.md",
                        "docs/index.md",
                        "docs/PLANS.md",
                        "docs/QUALITY_SCORE.md",
                        "docs/RELIABILITY.md",
                        "docs/SECURITY.md",
                        "docs/design-docs/index.md",
                        "docs/design-docs/core-beliefs.md",
                        "docs/exec-plans/index.md",
                        "docs/exec-plans/active/README.md",
                        "docs/exec-plans/completed/README.md",
